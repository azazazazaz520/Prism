name: CD

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # =========================================================================
  # 提取版本号（供后续 job 共享）
  # =========================================================================
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_body: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          # 去掉 v 前缀
          VER="${TAG#v}"
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Version resolved: ${VER}"

      - name: Generate changelog (commits since last tag)
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          {
            echo "## Changes since ${PREV_TAG:-initial commit}"
            echo ""
            git log ${RANGE} --pretty=format:"- %s (%an)" --no-merges
          } > /tmp/changelog.md
          # 多行输出；git log --format 末尾无换行，需补空行确保分隔符独立
          {
            echo "body<<CHANGELOG_EOF"
            cat /tmp/changelog.md
            echo ""
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

  # =========================================================================
  # Windows 构建 + 发布
  # =========================================================================
  build-windows:
    runs-on: windows-latest
    needs: version
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Inject version from tag
        shell: pwsh
        run: |
          $ver = "${{ env.VERSION }}"
          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = `"$ver`"" | Set-Content src-tauri/Cargo.toml
          (Get-Content src-tauri/tauri.conf.json) -replace '^  "version": ".*"', "  `"version`": `"$ver`"" | Set-Content src-tauri/tauri.conf.json
          (Get-Content package.json) -replace '^  "version": ".*"', "  `"version`": `"$ver`"" | Set-Content package.json
          Write-Host "Version injected: $ver"

      - name: Build Tauri app (NSIS installer)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run tauri build -- --bundles nsis

      - name: List build artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Path "src-tauri\target\release\bundle" -File

      - name: Generate update manifest
        shell: pwsh
        env:
          RELEASE_BODY: ${{ needs.version.outputs.release_body }}
        run: |
          $ver = "${{ env.VERSION }}"
          $installer = Get-ChildItem "src-tauri\target\release\bundle\nsis" -Filter "*setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "找不到 NSIS 安装包" }

          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLower()
          $downloadUrl = "https://github.com/azazazazaz520/Prism/releases/download/v$ver/$($installer.Name)"
          $releaseUrl = "https://github.com/azazazazaz520/Prism/releases/tag/v$ver"
          $releaseBody = $env:RELEASE_BODY

          $manifest = @{
            version      = $ver
            release_date = (Get-Date).ToUniversalTime().ToString("o")
            release_notes = $releaseBody
            download_url = $downloadUrl
            release_url  = $releaseUrl
            sha256       = $hash
          } | ConvertTo-Json -Depth 3

          $manifest | Set-Content "windows.json" -Encoding UTF8
          Write-Host "Generated windows.json:"
          Get-Content "windows.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Prism v${{ env.VERSION }}'
          tag_name: ${{ github.ref_name }}
          body: ${{ needs.version.outputs.release_body }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.zip
            windows.json
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Synchronize stable update manifest fallback
        if: ${{ !contains(github.ref_name, '-') }}
        shell: pwsh
        run: |
          git fetch origin master
          git checkout -B manifest-sync origin/master
          Copy-Item "windows.json" "update/windows.json" -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update/windows.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: 同步稳定版更新清单"
            git push origin HEAD:master
          } else {
            Write-Host "更新清单没有变化"
          }
