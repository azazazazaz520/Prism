name: Rust

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master', 'develop']

env:
  CARGO_TERM_COLOR: always

jobs:
  # =========================================================================
  # 前端类型检查 + 构建
  # =========================================================================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check

      - name: Type check (vue-tsc)
        run: npx vue-tsc --noEmit

      - name: Build frontend
        run: npm run build

  # =========================================================================
  # Commit 信息校验
  # =========================================================================
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint commits (since last merge from base)
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          LAST_SYNC=$(git merge-base origin/${{ github.event.pull_request.base.ref }} HEAD)
          # 逐个检查非 merge 提交，避免 GitHub 合成的 PR merge commit 干扰
          COMMITS=$(git rev-list --no-merges ${LAST_SYNC}..HEAD)
          if [ -z "$COMMITS" ]; then
            echo "No non-merge commits to check."
            exit 0
          fi
          FAIL=0
          for hash in $COMMITS; do
            echo "::group::Checking $hash"
            git --no-pager log -1 --oneline "$hash"
            if ! npx commitlint --from "$hash~1" --to "$hash" --verbose; then
              FAIL=1
            fi
            echo "::endgroup::"
          done
          exit $FAIL

  # =========================================================================
  # Rust 后端：格式检查、编译、测试
  # =========================================================================
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Tauri v2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        working-directory: src-tauri
        run: cargo build --verbose

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --verbose
