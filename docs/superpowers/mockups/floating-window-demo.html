<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>悬浮窗 Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
  }

  /* 模拟桌面背景 */
  .desktop-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect fill="%232d3436"/><circle cx="200" cy="150" r="80" fill="%23333" opacity="0.5"/><rect x="500" y="100" width="250" height="180" rx="8" fill="%23333" opacity="0.4"/><rect x="520" y="300" width="200" height="140" rx="8" fill="%23333" opacity="0.3"/></svg>') center/cover;
  }

  /* 透明度滑块全局控制 */
  .opacity-control {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 16px 24px;
    color: white;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 14px;
  }
  .opacity-control input[type="range"] {
    width: 160px;
    accent-color: #4a90d9;
  }
  .opacity-value {
    min-width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-family: monospace;
  }

  /* 悬浮窗 */
  .floating-window {
    position: fixed;
    top: 60px;
    right: 40px;
    width: 320px;
    background: rgba(30, 30, 40, 0.92);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
    overflow: hidden;
    transition: opacity 0.2s;
    user-select: none;
  }

  /* 顶部栏 */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .topbar-left {
    font-size: 12px;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .topbar-left .count {
    color: #4a90d9;
    font-weight: 600;
    font-size: 13px;
  }
  .topbar-btns {
    display: flex;
    gap: 6px;
  }
  .topbar-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    color: #999;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .topbar-btn:hover { background: rgba(255,255,255,0.15); color: #ddd; }
  .topbar-btn.active { background: rgba(74,144,217,0.2); color: #4a90d9; }

  /* 卡片区 */
  .card-area {
    padding: 16px;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 16px;
    transition: opacity 0.3s, transform 0.3s;
    animation: fadeIn 0.35s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-title {
    font-size: 15px;
    color: #eee;
    margin-bottom: 10px;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .card-pin { flex-shrink: 0; font-size: 13px; }
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .card-tag {
    font-size: 10px;
    background: rgba(74,144,217,0.2);
    color: #6db3f2;
    padding: 2px 7px;
    border-radius: 8px;
  }
  .card-due {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 8px;
    font-weight: 500;
  }
  .card-due.overdue { background: rgba(231,76,60,0.2); color: #f07070; }
  .card-due.today { background: rgba(243,156,18,0.2); color: #f5b642; }
  .card-due.upcoming { background: rgba(74,144,217,0.15); color: #6db3f2; }
  .card-important {
    font-size: 11px;
    color: #f5b642;
  }
  .no-tasks {
    text-align: center;
    color: #666;
    font-size: 14px;
  }

  /* 轮播控制器 */
  .carousel-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px 12px;
    gap: 14px;
  }
  .arrow-btn {
    background: rgba(255,255,255,0.06);
    border: none;
    color: #888;
    font-size: 16px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .arrow-btn:hover { background: rgba(255,255,255,0.15); color: #ddd; }
  .dots {
    display: flex;
    gap: 6px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.2s;
    cursor: pointer;
  }
  .dot.active {
    background: #4a90d9;
    box-shadow: 0 0 6px rgba(74,144,217,0.5);
  }

  /* 控制面板 */
  .panel {
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 12px 14px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .panel.show { display: flex; }
  .panel-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #999;
  }
  .panel-row label { flex-shrink: 0; margin-right: 10px; }
  .panel-row input[type="range"] {
    flex: 1;
    accent-color: #4a90d9;
    height: 4px;
  }
  .panel-row select {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ccc;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }
  .panel-row select option { background: #2d2d2d; color: #ccc; }

  .exit-btn {
    width: 100%;
    margin-top: 4px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #999;
    padding: 6px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .exit-btn:hover { background: rgba(231,76,60,0.15); color: #e74c3c; border-color: rgba(231,76,60,0.3); }

  /* 主窗口 */
  .main-window {
    width: 420px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  .main-titlebar {
    padding: 14px 18px;
    background: #f8f9fa;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .main-titlebar h2 { font-size: 18px; color: #1a1a2e; }
  .float-btn {
    background: #4a90d9;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .float-btn:hover { background: #357abd; }
  .main-content {
    padding: 20px;
  }
  .task-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    gap: 10px;
    font-size: 14px;
  }
  .task-row input[type="checkbox"] { accent-color: #4a90d9; width: 16px; height: 16px; }
  .task-row .done { text-decoration: line-through; color: #aaa; }

  /* 视图切换 */
  .view-switcher {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.4);
    border-radius: 20px;
    padding: 4px;
    display: flex;
    z-index: 100;
    backdrop-filter: blur(6px);
  }
  .view-btn {
    padding: 6px 18px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    color: #999;
    background: transparent;
    transition: all 0.2s;
  }
  .view-btn.active {
    background: rgba(255,255,255,0.15);
    color: white;
  }

  /* 状态提示 */
  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 2000;
    animation: slideIn 0.3s ease;
    pointer-events: none;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .view-container { display: none; }
  .view-container.active { display: block; }
</style>
</head>
<body>
<div class="desktop-bg"></div>

<!-- 视图切换 -->
<div class="view-switcher">
  <button class="view-btn active" onclick="switchView('both')">双窗口</button>
  <button class="view-btn" onclick="switchView('main')">仅主窗口</button>
  <button class="view-btn" onclick="switchView('float')">仅悬浮窗</button>
</div>

<!-- 主窗口 -->
<div class="view-container active" id="view-main">
  <div class="main-window" style="margin: 0 auto;">
    <div class="main-titlebar">
      <h2>TODO</h2>
      <button class="float-btn" onclick="showFloating()">🔲 切换到悬浮窗</button>
    </div>
    <div class="main-content" id="task-list"></div>
  </div>
</div>

<!-- 悬浮窗 -->
<div class="view-container active" id="view-float">
  <div class="floating-window" id="floating-window">
    <div class="topbar">
      <div class="topbar-left">
        <span>🎯 未完成:</span>
        <span class="count" id="float-count">0</span>
        <span>项</span>
      </div>
      <div class="topbar-btns">
        <button class="topbar-btn" id="settings-btn" onclick="togglePanel()">⚙️ 控制</button>
      </div>
    </div>

    <div class="card-area" id="card-area">
      <div class="no-tasks">🎉 全部完成！</div>
    </div>

    <div class="carousel-controls" id="carousel-controls">
      <button class="arrow-btn" onclick="prevCard()">◀</button>
      <div class="dots" id="dots"></div>
      <button class="arrow-btn" onclick="nextCard()">▶</button>
    </div>

    <div class="panel" id="control-panel">
      <div class="panel-row">
        <label>🔆 透明度</label>
        <input type="range" min="30" max="100" value="92" oninput="setOpacity(this.value)">
        <span class="opacity-value" id="opacity-val">0.92</span>
      </div>
      <div class="panel-row">
        <label>⏱ 自动轮播</label>
        <select id="interval-select" onchange="setInterval(this.value)">
          <option value="3000">3 秒</option>
          <option value="5000" selected>5 秒</option>
          <option value="10000">10 秒</option>
          <option value="0">关闭</option>
        </select>
      </div>
      <div class="panel-row">
        <label>🔔 截止提醒</label>
        <select onchange="setReminder(this.value)">
          <option value="0">关闭</option>
          <option value="10">提前 10 分钟</option>
          <option value="30" selected>提前 30 分钟</option>
          <option value="60">提前 1 小时</option>
        </select>
      </div>
      <button class="exit-btn" onclick="hideFloating()">↩ 退出悬浮窗</button>
    </div>
  </div>
</div>

<script>
  // 模拟任务数据
  const tasks = [
    { id: '1', title: '完成项目报告', completed: false, due_date: '2026-05-25', important: true, pinned: true, tags: ['工作'] },
    { id: '2', title: '回复客户邮件', completed: false, due_date: '2026-05-24', important: false, pinned: false, tags: ['工作', '紧急'] },
    { id: '3', title: '购买生日礼物', completed: false, due_date: '2026-05-28', important: true, pinned: false, tags: ['个人'] },
    { id: '4', title: '整理书桌抽屉', completed: false, due_date: null, important: false, pinned: false, tags: ['生活'] },
    { id: '5', title: '阅读《深入浅出Rust》', completed: false, due_date: '2026-06-10', important: false, pinned: false, tags: ['学习'] },
    { id: '6', title: '还图书馆的书', completed: true, due_date: null, important: false, pinned: false, tags: ['个人'] },
    { id: '7', title: '清理桌面文件', completed: true, due_date: null, important: false, pinned: false, tags: ['生活'] },
  ];

  const incompleteTasks = () => tasks.filter(t => !t.completed);

  let currentIndex = 0;
  let carouselTimer = null;
  let carouselInterval = 5000;
  let isPaused = false;

  function getDueStatus(dueDate) {
    if (!dueDate) return null;
    const today = '2026-05-25';
    if (dueDate < today) return 'overdue';
    if (dueDate === today) return 'today';
    return 'upcoming';
  }

  function formatDueLabel(dueDate) {
    if (!dueDate) return '';
    const status = getDueStatus(dueDate);
    if (status === 'today') return '今天到期';
    if (status === 'overdue') return '已过期';
    const [_, m, d] = dueDate.split('-');
    return `${parseInt(m)}/${parseInt(d)}`;
  }

  function dueStatusLabel(status) {
    if (status === 'overdue') return '已过期';
    if (status === 'today') return '今天到期';
    return '';
  }

  function renderCard(index) {
    const list = incompleteTasks();
    const area = document.getElementById('card-area');
    const dots = document.getElementById('dots');

    if (list.length === 0) {
      area.innerHTML = '<div class="no-tasks">🎉 全部完成！</div>';
      dots.innerHTML = '';
      document.getElementById('carousel-controls').style.display = 'none';
      return;
    }

    document.getElementById('carousel-controls').style.display = 'flex';
    const task = list[index % list.length];
    currentIndex = index % list.length;

    const dueStatus = getDueStatus(task.due_date);
    const dueText = formatDueLabel(task.due_date);

    area.innerHTML = `
      <div class="card">
        <div class="card-title">
          ${task.pinned ? '<span class="card-pin">📌</span>' : ''}
          <span>${task.title}</span>
        </div>
        <div class="card-meta">
          ${task.tags.map(t => `<span class="card-tag">🏷 ${t}</span>`).join('')}
          ${dueStatus ? `<span class="card-due ${dueStatus}">📅 ${dueText}</span>` : ''}
          ${task.important ? '<span class="card-important">⭐ 重要</span>' : ''}
        </div>
      </div>
    `;

    // 更新指示点
    dots.innerHTML = list.map((_, i) =>
      `<span class="dot${i === currentIndex ? ' active' : ''}" onclick="goToCard(${i})"></span>`
    ).join('');

    document.getElementById('float-count').textContent = list.length;
  }

  function nextCard() {
    const list = incompleteTasks();
    if (list.length === 0) return;
    currentIndex = (currentIndex + 1) % list.length;
    renderCard(currentIndex);
    resetTimer();
  }

  function prevCard() {
    const list = incompleteTasks();
    if (list.length === 0) return;
    currentIndex = (currentIndex - 1 + list.length) % list.length;
    renderCard(currentIndex);
    resetTimer();
  }

  function goToCard(i) {
    currentIndex = i;
    renderCard(currentIndex);
    resetTimer();
  }

  function setOpacity(val) {
    const opacity = val / 100;
    document.getElementById('floating-window').style.background =
      `rgba(30, 30, 40, ${opacity})`;
    document.getElementById('opacity-val').textContent = opacity.toFixed(2);
  }

  function setInterval(ms) {
    carouselInterval = parseInt(ms);
    resetTimer();
  }

  let reminderMinutes = 30;
  function setReminder(val) {
    reminderMinutes = parseInt(val);
  }

  function resetTimer() {
    if (carouselTimer) clearInterval(carouselTimer);
    if (carouselInterval > 0 && !isPaused) {
      carouselTimer = setInterval(nextCard, carouselInterval);
    }
  }

  function togglePanel() {
    const panel = document.getElementById('control-panel');
    const btn = document.getElementById('settings-btn');
    panel.classList.toggle('show');
    btn.classList.toggle('active', panel.classList.contains('show'));
  }

  // 鼠标悬停暂停轮播
  document.getElementById('floating-window').addEventListener('mouseenter', () => {
    isPaused = true;
    if (carouselTimer) clearInterval(carouselTimer);
  });
  document.getElementById('floating-window').addEventListener('mouseleave', () => {
    isPaused = false;
    resetTimer();
  });

  // 渲染主窗口任务列表
  function renderMainList() {
    const el = document.getElementById('task-list');
    el.innerHTML = tasks.map(t => `
      <div class="task-row">
        <input type="checkbox" ${t.completed ? 'checked' : ''} onclick="toggleTask('${t.id}')">
        <span class="${t.completed ? 'done' : ''}">${t.title}</span>
        ${t.important ? '⭐' : ''}
        ${t.pinned ? '📌' : ''}
        ${t.due_date ? '📅 ' + formatDueLabel(t.due_date) : ''}
        ${t.tags.map(tag => '🏷' + tag).join(' ')}
      </div>
    `).join('');
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.completed = !task.completed;
      renderMainList();
      renderCard(currentIndex);
    }
  }

  function showFloating() {
    document.getElementById('view-main').classList.remove('active');
    document.getElementById('view-float').classList.add('active');
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.view-btn:nth-child(3)').classList.add('active');
    currentIndex = 0;
    renderCard(0);
    resetTimer();
    showToast('已切换到悬浮窗模式');
  }

  function hideFloating() {
    document.getElementById('view-main').classList.add('active');
    document.getElementById('view-float').classList.remove('active');
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.view-btn:nth-child(2)').classList.add('active');
    if (carouselTimer) clearInterval(carouselTimer);
    document.getElementById('control-panel').classList.remove('show');
    document.getElementById('settings-btn').classList.remove('active');
    showToast('已返回主窗口');
  }

  function switchView(view) {
    document.getElementById('view-main').classList.toggle('active', view === 'both' || view === 'main');
    document.getElementById('view-float').classList.toggle('active', view === 'both' || view === 'float');
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    if (view === 'both') document.querySelector('.view-btn:nth-child(1)').classList.add('active');
    if (view === 'main') document.querySelector('.view-btn:nth-child(2)').classList.add('active');
    if (view === 'float') document.querySelector('.view-btn:nth-child(3)').classList.add('active');
    if (view === 'float') { currentIndex = 0; renderCard(0); resetTimer(); }
    if (view === 'main' && carouselTimer) clearInterval(carouselTimer);
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  // 初始化
  renderMainList();
  renderCard(0);
  resetTimer();
</script>
</body>
</html>
